<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canva UI Clone</title>

<link rel="stylesheet" href="homework2.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- Top Navbar -->
<header class="navbar">

    <div class="nav-left">
        <h2>Canva</h2>

        <a href="#">File</a>
        <a href="#">Resize</a>
        <a href="#">Editing</a>
    </div>

    <div class="nav-right">
        <button class="trial">Start your trial</button>
        <button class="present">Present</button>
        <button class="share">Share</button>
    </div>

</header>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="icon-box">
            <i class="fa-regular fa-file"></i>
            <span>Templates</span>
        </div>

        <div class="icon-box">
            <i class="fa-solid fa-shapes"></i>
            <span>Elements</span>
        </div>

        <div class="icon-box">
            <i class="fa-solid fa-font"></i>
            <span>Text</span>
        </div>

        <div class="icon-box">
            <i class="fa-solid fa-image"></i>
            <span>Uploads</span>
        </div>

        <div class="icon-box">
            <i class="fa-solid fa-wrench"></i>
            <span>Tools</span>
        </div>

        <div class="icon-box">
            <i class="fa-solid fa-folder"></i>
            <span>Projects</span>
        </div>

        <div class="icon-box">
            <i class="fa-solid fa-table-cells"></i>
            <span>Apps</span>
        </div>

    </aside>

    <!-- Search Panel -->

    <section class="panel">

        <div class="search-area">

            <input type="text"
            placeholder="Describe your ideal design">

            <div class="btns">
                <button class="generate">Generate</button>
                <button class="search">Search</button>
            </div>

        </div>

        <div class="title">
            <h3>Recently Used</h3>
            <a href="#">See all</a>
        </div>

        <div class="recent-grid">
            <div class="thumb"></div>
            <div class="thumb"></div>
        </div>

        <div class="title">
            <h3>All Results</h3>
        </div>

        <div class="results-grid">

            <div class="card"><img scr="3d image/download.jpeg"></div>
            <div class="card"><img scr="3d image/download.jpeg"></div>
            <div class="card"><img scr="3d image/download.jpeg"></div>
            <div class="card"><img scr="3d image/download.jpeg"></div>
            <div class="card"><img scr="3d image/download.jpeg"></div>
            <div class="card"><img scr="3d image/download.jpeg"></div>
            <div class="card"></div>
            <div class="card"></div>
            <div class="card"></div>
            <div class="card"></div>

        </div>

    </section>

    <!-- Workspace -->

    <main class="workspace">

        <div class="toolbar">

            <button>Edit</button>
            <button><i class="fa-solid fa-palette"></i></button>
            <button><i class="fa-solid fa-bars"></i></button>
            <button>Effects</button>
            <button>Animate</button>

        </div>

        <div class="canvas">

            <div class="circle"></div>
            <div class="square"></div>
            <div class="triangle"></div>
            <div class="pentagon"></div>

            <div class="plus"></div>
            <div class="parallelogram"></div>
            <div class="arrow"></div>
            <div class="heart"></div>

        </div>

        <div class="bottom-bar">

            <button>-</button>
            <span>53%</span>
            <button>+</button>

        </div>

    </main>

</div>

</body>
</html>
